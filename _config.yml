# =============================================================================
# SITE CONFIGURATION
# =============================================================================

# Core Identity
title: Darren Bell
tagline: Senior Cloud Architect · Microsoft 365 & Azure · Healthcare IT Leadership
description: >-
  Practical insights on cloud architecture, Microsoft 365, IT leadership,
  and building secure, cost-efficient technology operations in regulated environments—
  written by a practitioner who has done it.

# Author
author:
  name: Darren Bell
  title: Senior Cloud Architect & IT Leader
  bio: >-
    Senior Cloud Architect with 10+ years leading technology operations across
    healthcare, managed services, and regulated industries. Specializing in Microsoft
    365, Azure, identity architecture, and IT cost optimization. I write about what
    it actually takes to build resilient, compliant, and cost-efficient operations.
  avatar: /assets/images/1769196097959.jpg
  location: Baton Rouge, Louisiana
  email: ""
  linkedin: "https://www.linkedin.com/in/belldarren/"
  github: "https://github.com/darrenbell09"
  twitter: ""

# URLs — adjust baseurl if you move to a custom domain or username repo
url: "https://darrenbell09.github.io"
baseurl: "/DB_Blog"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: true

# Sass
sass:
  style: compressed

# Pagination (blog/index.html)
paginate: 6
paginate_path: "/blog/page:num/"

# Plugins (GitHub Pages whitelist compatible)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# RSS Feed
feed:
  path: atom.xml
  posts_limit: 20

# SEO defaults
twitter:
  username: darrenbell09
og_image: /assets/images/og-default.svg

# =============================================================================
# INTEGRATIONS (fill in your own values)
# =============================================================================

# Google Analytics 4 — add your Measurement ID (e.g. G-XXXXXXXXXX)
google_analytics: ""

# utterances comments — uses GitHub Issues on this repo
comments:
  provider: utterances
  utterances:
    repo: "darrenbell09/DB_Blog"
    issue_term: "pathname"
    theme: "github-dark"
    label: "blog-comment"

# Formspree contact form — add your form ID
formspree_id: ""

# Newsletter — paste your Buttondown/ConvertKit/Mailchimp embed URL here
# e.g. https://buttondown.email/api/emails/embed-subscribe/YOUR_USERNAME
newsletter_url: ""

# =============================================================================
# POST DEFAULTS
# =============================================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      share: true
      image: /assets/images/og-default.svg

# =============================================================================
# BUILD EXCLUSIONS
# =============================================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
  - "*.sh"
