<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.4"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-grad)"/>

  <!-- Subtle grid overlay -->
  <g clip-path="url(#circle-clip)" opacity="0.08">
    <line x1="0" y1="33" x2="200" y2="33" stroke="white" stroke-width="1"/>
    <line x1="0" y1="66" x2="200" y2="66" stroke="white" stroke-width="1"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="133" x2="200" y2="133" stroke="white" stroke-width="1"/>
    <line x1="0" y1="166" x2="200" y2="166" stroke="white" stroke-width="1"/>
    <line x1="33" y1="0" x2="33" y2="200" stroke="white" stroke-width="1"/>
    <line x1="66" y1="0" x2="66" y2="200" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="white" stroke-width="1"/>
    <line x1="133" y1="0" x2="133" y2="200" stroke="white" stroke-width="1"/>
    <line x1="166" y1="0" x2="166" y2="200" stroke="white" stroke-width="1"/>
  </g>

  <!-- Inner glow ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#ring-grad)" stroke-width="1.5"/>

  <!-- Monogram -->
  <text
    x="100"
    y="118"
    font-family="Arial, Helvetica, sans-serif"
    font-size="72"
    font-weight="800"
    text-anchor="middle"
    fill="white"
    opacity="0.95"
    letter-spacing="-3"
  >DB</text>
</svg>
