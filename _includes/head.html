<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

{% seo %}
{% assign og_img = page.image | default: site.image %}
{% if og_img %}
<meta property="og:image" content="{{ og_img | prepend: site.url }}">
<meta name="twitter:image" content="{{ og_img | prepend: site.url }}">
{% endif %}

<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | prepend: site.baseurl | prepend: site.url }}">

<!-- RSS Feed -->
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/atom.xml' | prepend: site.baseurl | prepend: site.url }}">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | prepend: site.baseurl }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/avatar.svg' | prepend: site.baseurl }}">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}">

<!-- Google Analytics 4 -->
{% if site.google_analytics and jekyll.environment == 'production' %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}', { anonymize_ip: true });
</script>
{% endif %}
